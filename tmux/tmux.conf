set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

unbind C-b
bind C-a send-prefix
set-option -g prefix C-a
set-option -g detach-on-destroy off


# set the scrollback
set -g history-limit 50000

#bind -n M-s set-option -g status
bind -n M-s set-window-option synchronize-panes

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-\\    select-pane -l

# Shift arrow to switch windows and sessions
bind -n C-Left  previous-window
bind -n C-Right next-window
bind -n C-Up    switch-client -n
bind -n C-Down  switch-client -p

bind c new-window -c "#{pane_current_path}"
bind -n C-S-Left  { swap-window -t -1; previous-window }
bind -n C-S-Right { swap-window -t +1; next-window }


bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# --- Claude Code <-> tmux integration ---
# Claude Code hooks paint each pane's state via scripts/claude-tmux.sh (per-pane, so
# several claudes can share a window). The window list shows the aggregate glyph
# (● busy · ✓ done · ◆ needs you); pane borders (prefix+t) show each pane's own state.
#
# Pane navigation (fzf popups, tmux 3.2+) lives in scripts/pane-switch.sh:
# Alt + j : fzf-pick ANY pane (addr + path + process + title), then jump
# Alt + J : jump to the next *pane* where a Claude awaits your input (wait / red ◆),
#           or a message if none
# Alt + k : jump back to the pane you came from (toggles between the two)
# These are root-table (no-prefix) bindings, like M-s / M-arrows above. Every jump
# records the pane you leave in @pane_prev (Alt+j stashes it via @pane_origin first,
# since a popup can't read the origin pane reliably); Alt+k reads it and re-records,
# so it toggles back and forth.
bind -n M-j run-shell "tmux set -g @pane_origin '#{pane_id}'" \; display-popup -E -w 70% -h 60% "~/.config/tmux/scripts/pane-switch.sh switch"
bind -n M-J run-shell "~/.config/tmux/scripts/pane-switch.sh jump '#{pane_id}'"
bind -n M-k run-shell "~/.config/tmux/scripts/pane-switch.sh back '#{pane_id}'"

# Alt + 0 : manually mark THIS pane done (green ✓) — clears a 'busy' that got stuck,
# e.g. after an Esc-interrupt, which fires no Stop hook. Same effect as the Stop hook's
# `claude-tmux.sh state done`; TMUX_PANE='#{pane_id}' aims it at the focused pane (the
# script reads $TMUX_PANE, and run-shell children don't inherit it).
bind -n M-0 run-shell "TMUX_PANE='#{pane_id}' ~/.config/tmux/scripts/claude-tmux.sh state done"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Pane titles
# Show the explicit pane title if one was set (via prefix+T); otherwise fall
# back to the current command. "No title" is either the tmux default (the
# hostname) OR an empty string: TUI apps like Claude Code set the title via
# OSC while running and clear it to "" on exit, so treat both as "no title".
set -g pane-border-format " #{?@claude_state,#{?#{==:#{@claude_state},wait},#[fg=colour196]◆,#{?#{==:#{@claude_state},busy},#[fg=colour220]●,#[fg=colour231]✓}}#[default] ,}#{?pane_active,#[bold],}#[fg=colour220]#{?#{||:#{==:#{pane_title},#{host}},#{==:#{pane_title},}},#{pane_current_command},#{pane_title}} "
# prefix + t : toggle the pane title bar on/off
bind t if -F '#{==:#{pane-border-status},off}' \
  'set -g pane-border-status top' \
  'set -g pane-border-status off'
# prefix + T : type/edit the current pane's title (pre-filled with the old one)
bind T command-prompt -I "#{pane_title}" -p "Pane title:" "select-pane -T '%%'"


# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Copy mode -> system clipboard (OSC 52, terminal-native; works locally + over SSH)
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel


# don't rename windows automatically
set -g allow-rename off

set -sg escape-time 0

# General behaviour
set -g focus-events on        # let editors (nvim) react to focus changes
set -g allow-passthrough on   # let apps emit raw escapes (kitty graphics/sixel) through tmux
set -g base-index 1           # number windows from 1
setw -g pane-base-index 1     # number panes from 1
set -g renumber-windows on    # close a window -> renumber the rest
set -g display-time 2000      # show status messages for 2s (default 750ms)


# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none


# load theme
if-shell "echo $TERM | grep -q 256" {
   
   # The modes
   set -g clock-mode-colour colour214
   set -g mode-style fg=colour234,bg=colour214,bold
   
   # The panes
   setw -g pane-border-lines heavy
   set -g pane-border-style bg=default,fg=colour245
   set -g pane-active-border-style bg=default,fg=colour220,bold

   # Dim inactive panes a touch: dim the default text in every pane, then reset
   # the active pane to normal so the focused pane stays crisp. Backgrounds are
   # left alone on purpose — washing them gray colored every pane, since some
   # terminals don't restore bg=default on the active pane.
   set -g window-style 'fg=colour245'
   set -g window-active-style 'fg=default'
   
   # The statusbar
   set -g status-style bg=colour235,fg=colour245
   set -g status-position bottom
   set -g status-left ''
   set -g status-right '#[fg=colour234,bg=colour214,bold] #S #[fg=colour250,bg=colour238] %d/%m ~ %H:%M '
   set -g status-right-length 50
   set -g window-status-current-style fg=colour234,bg=colour214,bold
   # window name color = @claude_win: highest-priority state over the window's claude
   # panes (red=wait > amber=busy > green=done; set by claude-tmux.sh). The current
   # window's gold tab uses darker shades of each so the name stays readable on gold.
   # Synchronized panes still override the name to red. Per-pane state is on pane borders.
   set -g window-status-current-format '#{?pane_synchronized,#[fg=colour231]#[bg=colour160],#{?@claude_win,#{?#{==:#{@claude_win},wait},#[fg=colour88],#{?#{==:#{@claude_win},busy},#[fg=colour94],#[fg=colour28]}},#[fg=colour234]}} #W '
   set -g window-status-style fg=colour245,bg=colour235,none
   set -g window-status-format ' #{?pane_synchronized,#[fg=colour160],#{?@claude_win,#{?#{==:#{@claude_win},wait},#[fg=colour196],#{?#{==:#{@claude_win},busy},#[fg=colour220],#[fg=colour40]}},#[fg=colour245]}}#W '
   set -g window-status-bell-style fg=colour231,bg=colour196,bold
   
   # The messages
   set -g message-style fg=colour234,bg=colour220,bold
}
